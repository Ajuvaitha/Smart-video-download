<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Video Downloader</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="header-content">
        <h1>Smart Video Downloader</h1>
        <p class="subtitle">Detect & download page videos</p>
      </div>
      <button id="clearBtn" class="clear-btn" title="Clear all detected videos">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
      </button>
    </header>
    
    <div class="list-container">
      <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p>Loading...</p>
      </div>
      <div id="empty-state" class="empty-state hidden">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="empty-icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        <p>No videos detected yet.</p>
        <span>Play a video on the page to detect it.</span>
      </div>
      <ul id="video-list">
        <!-- Videos will be populated here -->
      </ul>
    </div>
    
  </div>
  <script src="popup.js"></script>
</body>
</html>
